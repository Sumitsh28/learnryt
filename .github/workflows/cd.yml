name: 🚀 CD - Deploy to EAS

on:
  push:
    branches: ["main", "master"]

jobs:
  deploy:
    name: Publish EAS Update
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Setup Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: 🚀 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install Dependencies
        run: npm ci

      - name: ☁️ Publish Over-The-Air Update
        run: |
          eas update --auto --branch main --message "Automated update via GitHub Actions: ${{ github.event.head_commit.message }}"
